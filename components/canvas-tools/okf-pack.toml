name = "okf.pack"
description = "Pack a built OKF bundle directory into a single .tar.gz for publishing."
kind = "command"
binary = "tar"
args_mode = "template"
args = ["-czf", "{{output}}", "-C", "{{input}}", "."]

[params.input]
type = "path"
allowed_prefix = "$SESSION_DIR"
must_exist = true
[params.output]
type = "path"
allowed_prefix = "$SESSION_DIR"

[constraints]
timeout_seconds = 60
cwd = "$SESSION_DIR"
